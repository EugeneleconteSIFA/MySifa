# Kernse — vhost admin.kernse.fr (proxy vers 127.0.0.1:8102)
# Fichier généré par kernse/deploy/vps/. Version-contrôlée dans le repo.
# À déployer : sudo cp admin.kernse.fr.conf /etc/nginx/sites-available/
#              sudo ln -s /etc/nginx/sites-available/admin.kernse.fr.conf /etc/nginx/sites-enabled/

# HTTP → challenge ACME + redirect HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name admin.kernse.fr;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$server_name$request_uri; }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.kernse.fr;

    ssl_certificate     /etc/letsencrypt/live/admin.kernse.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.kernse.fr/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 20M;

    # SÉCURITÉ ADMIN — décommenter pour restreindre par IP :
    # allow 12.34.56.78;   # ton IP personnelle
    # allow 87.65.43.21;   # une autre IP de secours
    # deny all;

    location /healthz {
        proxy_pass http://127.0.0.1:8102;
        proxy_set_header Host $host;
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:8102;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
    }
}
